<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IslandLink SDMS | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">
    <div class="logo">I</div>
    <h1>IslandLink SDMS</h1>
    <p class="subtitle">Create an account to access the distribution portal</p>

    <form action="../php/register.php" method="POST" class="login-card">

        <p class="label">Select User Role</p>

        <div class="roles">
            <label class="role active">
                <input type="radio" name="role" value="retailer" checked>
                Retailer
            </label>
            <label class="role">
                <input type="radio" name="role" value="staff">
                Staff
            </label>
            <label class="role">
                <input type="radio" name="role" value="driver">
                Driver
            </label>
            <label class="role">
                <input type="radio" name="role" value="admin">
                Admin
            </label>
        </div>

        <p class="role-desc">Choose the role that matches your responsibility</p>

        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="John Doe" required>

        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@islandlink.com" required>

        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="07XXXXXXXX" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Create Account →</button>

        <div class="footer">
            <span>Secure Registration</span>
            <p>Your information is encrypted and securely stored.</p>
        </div>

    </form>
</div>

<script src="../js/script.js"></script>
</body>
</html>
